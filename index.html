<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>家保盒 / HomeProof — 隐私政策 / Privacy Policy</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, system-ui, "PingFang SC", sans-serif;
    background: #f2f2f7; color: #1c1c1e; padding: 24px;
  }
  .card {
    background: #fff; border: 1px solid #e3e3e8; border-radius: 20px;
    padding: 36px 30px; max-width: 460px; width: 100%; text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
  }
  .icon {
    width: 76px; height: 76px; border-radius: 18px; margin: 0 auto 16px;
    background: linear-gradient(180deg, #34a0ff, #0066e6);
    display: flex; align-items: center; justify-content: center;
  }
  .icon svg { width: 46px; height: 46px; }
  h1 { font-size: 1.4rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  p.sub { color: #6b6b70; margin: 0 0 24px; font-size: 0.95rem; }
  a.link {
    display: block; text-decoration: none; color: #007aff; font-weight: 600;
    font-size: 1.05rem; padding: 15px; border: 1px solid #e3e3e8; border-radius: 14px;
    margin: 10px 0; transition: background 0.15s;
  }
  a.link:hover { background: #f2f7ff; }
  .foot { color: #98989f; font-size: 0.8rem; margin-top: 18px; }
  @media (prefers-color-scheme: dark) {
    body { background: #000; color: #f2f2f7; }
    .card { background: #1c1c1e; border-color: #2c2c2e; }
    p.sub { color: #98989f; }
    a.link { border-color: #2c2c2e; color: #4da3ff; }
    a.link:hover { background: #0a1f3f; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M8 12.5l2.5 2.5L16 9.5"></path>
      </svg>
    </div>
    <h1>家保盒 / HomeProof</h1>
    <p class="sub">隐私政策 · Privacy Policy</p>

    <a class="link" href="privacy-policy.zh.html">简体中文</a>
    <a class="link" href="privacy-policy.en.html">English</a>

    <p class="foot">所有数据仅保存在你的设备本地 · All data stays on your device</p>
  </div>
</body>
</html>
